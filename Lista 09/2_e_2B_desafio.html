<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2 Desafio</title>
</head>

<body>
    <div>
        <label for="">Digite o Texto que quer inverter</label>
        <input type="text" id="ipt_texto">
        <button onclick="inverter()">Inverter</button>
    </div>
    <div id="id_resultado">

    </div>
</body>

<script>
    function inverter() {
            // declaração insana de váriaveis
            id_resultado.innerHTML = ""
            let resultado = "";
            let texto = ipt_texto.value;
            let novo_texto = "";

            // for brabo que percorre da ultima letra e armazena até a primeira
            for (let i = texto.length - 1; i >= 0; i--) {
                novo_texto += texto[i];
            }
            texto = novo_texto;

            resultado = texto;

            id_resultado.innerHTML = resultado;

        }

</script>

</html>
