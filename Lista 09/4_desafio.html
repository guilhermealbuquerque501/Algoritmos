<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poupança</title>
</head>
<body>
    <h2>Poupança</h2>
    Entre com o valor mensal de depósito: <input id="ipt_deposito" type="number"> <br>
    Entre com a quantidade de meses: <input id="ipt_meses" type="number"> <br>
    Entre com o percentual de juros: <input id="ipt_juros" type="number"> <br> <br>
    Qual é o seu sonho: <input id="ipt_sonho"> <br>
    Qual o valor do seu sonho: <input id="ipt_valorSonho" type="number">
    <button onclick="projetar()">Projetar</button><br> <br>
    <div id="div_msg"></div>
</body>
<script>
function projetar() {

    let deposito = Number(ipt_deposito.value);
    let meses = Number(ipt_meses.value);
    let juros = Number(ipt_juros.value) / 100;
    let sonho = ipt_sonho.value;
    let valorSonho = Number(ipt_valorSonho.value);

    div_msg.innerHTML = "";

    if (deposito <= 0) {
        div_msg.innerHTML = "Depósito deve ser maior que 0";
    }

    if (meses <= 0 || !Number.isInteger(meses)) {
        div_msg.innerHTML = "Meses deve ser inteiro e maior que 0";
    }

    if (juros <= 0 || juros >= 0.10) {
        div_msg.innerHTML = "Juros deve ser maior que 0 e menor que 10%";
    }

    if (sonho.length < 3) {
        div_msg.innerHTML = "O sonho deve ter pelo menos 3 caracteres";
    }

    if (valorSonho <= deposito) {
        div_msg.innerHTML = "Valor do sonho deve ser maior que o depósito";
    }

    let valor_inicial = 0;
    let valor_final = 0;

    for (let i = 1; i <= meses; i++) {
        let juros_mes = valor_inicial * juros;
        valor_final = valor_inicial + juros_mes + deposito;

        div_msg.innerHTML += `
        Mês = ${i} - Valor Inicial = R$ ${valorInicial.toFixed(2)} 
        - Juros = R$ ${jurosMes.toFixed(2)} 
        - Depósito = R$ ${deposito.toFixed(2)} 
        - Valor Final = R$ ${valorFinal.toFixed(2)} <br>
        `;

        valor_inicial = valor_final;
    }

    let diferenca = valor_final - valor_sonho;

    if (valor_final >= valorSonho) {
        div_msg.innerHTML += `<br><b>Parabéns você é um POUPADOR, além do seu sonho de ${sonho} ainda sobrou R$ ${diferenca.toFixed(2)} para outras aquisições</b>`;
    } else {
        div_msg.innerHTML += `<br><b>Você precisa poupar um pouco mais. Para o sonho de ${sonho} ainda falta R$ ${diferenca}</b>`;
    }
}
</script>
</html>
