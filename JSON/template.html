<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <h2>Buscar Filmes:</h2>

  <span>Nome:</span>
  <input type="text" id="ipt_nome">
  <button onclick="pesquisarNome()">Pesquisar</button>

  <span>Diretor:</span>
  <input type="text" id="ipt_diretor">
  <button onclick="pesquisarDiretor()">Pesquisar</button>

  <span>Ano:</span>
  <select id="ipt_ano_parametro">
    <option value="maior_igual">&gt;=</option>
    <option value="igual">==</option>
    <option value="menor_igual">&lt;=</option>
  </select>
  <input type="number" id="ipt_ano">
  <button onclick="pesquisarAno()">Pesquisar</button><br><br>

  <span>Gênero:</span>
  <input type="text" id="ipt_genero">
  <button onclick="pesquisarGenero()">Pesquisar</button>

  <span>Média:</span>
  <select id="ipt_media_parametro">
    <option value="maior_igual">&gt;=</option>
    <option value="igual">==</option>
    <option value="menor_igual">&lt;=</option>
  </select>
  <input type="text" id="ipt_media">
  <button onclick="pesquisarMedia()">Pesquisar</button><br><br>

  <button onclick="pesquisar()">Mostrar Todos</button>

  <div id="div_resultado"></div>
</body>

</html>
<script src="dados.js"></script>
<script>

function calcularMedia(notas) {
  let soma = 0;

  for (let i = 0; i < notas.length; i++) {
    soma += parseFloat(notas[i]);
  }

  return soma / notas.length;
}

  function pesquisarNome() {
    let nome_dig = ipt_nome.value.toLowerCase();

    div_resultado.innerHTML = "";

    for (let i = 0; i < filmes.length; i++) {
      let media = calcularMedia(filmes[i].notas); 
      let nome_filme = filmes[i].nome.toLowerCase();

      if (nome_filme.includes(nome_dig)) {
        div_resultado.innerHTML += `<br>Nome: ${filmes[i].nome} | Diretor: ${filmes[i].diretor} | Ano: ${filmes[i].ano} | Média: ${media.toFixed(2)}<br>`;
      }
    }
  }

  function pesquisarDiretor() {
    let diretor_dig = ipt_diretor.value.toLowerCase();

    div_resultado.innerHTML = "";

    for (let i = 0; i < filmes.length; i++) {
      let media = calcularMedia(filmes[i].notas); 
      let nome_diretor = filmes[i].diretor.toLowerCase();

      if (nome_diretor.includes(diretor_dig)) {
        div_resultado.innerHTML += `<br>Nome: ${filmes[i].nome} | Diretor: ${filmes[i].diretor} | Ano: ${filmes[i].ano} | Média: ${media.toFixed(2)}<br>`;
      }
    }
  }

function pesquisarAno() {
  let ano = Number(ipt_ano.value);
  let operador = ipt_ano_parametro.value;

  div_resultado.innerHTML = "";

  for (let i = 0; i < filmes.length; i++) {
    let media = calcularMedia(filmes[i].notas);

    if (operador == "maior_igual" && filmes[i].ano >= ano ||
        operador == "igual" && filmes[i].ano == ano ||
        operador == "menor_igual" && filmes[i].ano <= ano) {

      div_resultado.innerHTML += `<br>Nome: ${filmes[i].nome} | Diretor: ${filmes[i].diretor} | Ano: ${filmes[i].ano} | Média: ${media.toFixed(2)}<br>`;
    }
  }
}


function pesquisarGenero() {
  let genero_dig = ipt_genero.value.toLowerCase();
  
  div_resultado.innerHTML = "";
  
  for (let i = 0; i < filmes.length; i++) {

    let media = calcularMedia(filmes[i].notas); 

    for (let j = 0; j < filmes[i].generos.length; j++) {
      
      let genero = filmes[i].generos[j].toLowerCase();
      
      if (genero == genero_dig) {
        
        div_resultado.innerHTML += `<br>Nome: ${filmes[i].nome} | Diretor: ${filmes[i].diretor} | Ano: ${filmes[i].ano} | Média: ${media.toFixed(2)}<br>`;
        break
        
      }
    }
  }
}

  function pesquisarMedia() {
  let valor = Number(ipt_media.value);
  let operador = ipt_media_parametro.value;

  div_resultado.innerHTML = "";

  for (let i = 0; i < filmes.length; i++) {
    let media = calcularMedia(filmes[i].notas);

    if (operador == "maior_igual" && media >= valor ||
        operador == "igual" && media == valor ||
        operador == "menor_igual" && media <= valor) {

      div_resultado.innerHTML += `Nome: ${filmes[i].nome} | Diretor: ${filmes[i].diretor} | Ano: ${filmes[i].ano} | Média: ${media.toFixed(2)}<br>`;
    }
  }
}

function pesquisar() {
  div_resultado.innerHTML = "";

  for (let i = 0; i < filmes.length; i++) {
    let media = calcularMedia(filmes[i].notas);

    div_resultado.innerHTML += `Nome: ${filmes[i].nome} | Diretor: ${filmes[i].diretor} | Ano: ${filmes[i].ano} | Média: ${media.toFixed(2)}<br>`;
  }
}

</script>
