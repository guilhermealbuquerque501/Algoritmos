<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div>
        <button onclick="jogar()">
            jogar
        </button>
    </div>

    <br>
    <br>
    <div id="id_resultado">

    </div>
</body>

<script>
    let dado1
    let dado2
    let vitoria1 = 0;
    let vitoria2 = 0;
    let empate = 0;
    function jogar() {
        dado1 = Math.floor(Math.random() * 6) + 1;
        dado2 = Math.floor(Math.random() * 6) + 1;
        if (dado1 > dado2) {
            vitoria1++;
        }
        else if (dado2 > dado1) {
            vitoria2++;
        }
        else {
            empate++;
        }
        id_resultado.innerHTML += `<br>  Jogador 1: ${vitoria1}  <br>
                                    Jogador 2: ${vitoria2} <br>
                                    Empate: ${empate} `;
        if (vitoria1 > vitoria2) {
            id_resultado.innerHTML += `<br> <br> O jogador 1 está vencendo`;
        }
        else if (vitoria2 > vitoria1) {
            id_resultado.innerHTML += `<br> <br> O jogador 2 está vencendo`;
        }
        else {
            id_resultado.innerHTML += `<br> <br> O jogo está empatado!`;
        }
    }

</script>

</html>
