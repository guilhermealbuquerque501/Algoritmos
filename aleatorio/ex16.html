<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div>
        <label for="ipt_nome">Digite seu nome</label>
        <input type="text" id="ipt_nome">
        <br>
        <br>
        <hr>
        <label for="ipt_numero">Digite um número de 1 a 10</label>
        <input type="text" id="ipt_numero">
        <button onclick="sortear()">
            Sortear
        </button>
    </div>
    <br>
    <br>
    <hr>
    <div id="id_resultado">

    </div>
</body>

<script>
    let contador = 0
    function sortear() {
        let numero_user = Number(ipt_numero.value);
        let nome = ipt_nome.value;

        let numero_sorteado = Math.floor(Math.random () * 10) + 1;

        if (numero_user <= 10 && numero_user >= 1) {
            contador++
            if (numero_user == numero_sorteado) {
                id_resultado.innerHTML = `Parabéns, ${ipt_nome.value} você foi sorteado(a) com o número ${numero_user} após ${contador} sorteios!`;
            }
            else{
                id_resultado.innerHTML = `ainda não foi sorteado`;
            }
        }
        else {
            alert(`Digite um número válido de 1 a 10`);
        }
    }
</script>

</html>
