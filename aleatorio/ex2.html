<script>
    function sortear() {
        id_resultado.innerHTML = "";
        let num1 = Math.random();

        let conta = num1 * (5 + 0)

        console.log(num1);
        
        console.log(conta);

        
        if (conta < 1) {
            
            id_resultado.innerHTML = `<img src="./images/Corinthians_simbolo.png" alt="" style="height: 150px; width: 150px;">`
        }
        
        else if (conta < 2) {
            
            id_resultado.innerHTML = `<img src="./images/palmeiras.png" alt="" style="height: 150px; width: 150px;"> `;
        }
        
        else if (conta < 3) {
            
            id_resultado.innerHTML = `<img src="./images/sao_paulo.png" alt="" style="height: 150px; width: 150px;">`;

        }

        else if (conta < 4) {
            
            id_resultado.innerHTML = `<img src="./images/Santos_Logo.png" alt="" style="height: 150px; width: 150px;"> ` ;

        }

    }
</script>
