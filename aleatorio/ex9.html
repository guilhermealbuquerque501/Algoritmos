<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <button onclick="gerar_nota()">Gerar uma nota de aluno entre 0 e 10</button> <br><br>
    <div id="id_resultado"></div>
    <br>
    <br>
    <hr>
    <button onclick="gerar_frequencia()">Gerar uma frequência de aluno entre 0 e 100</button> <br><br>
    <div id="id_resultado2"></div>
    <br>
    <br>
    <hr>
    <button onclick="situacao()">Ver Situação</button>
    <br>
    <br>
    <hr>
    <div id="id_resultado3">

    </div>
</body>

</html>

<script>
    let nota
    let freq

    function gerar_nota() {
        nota = (Math.random() * (10 - 3 + 1) + 3)
            .toFixed(1);

        id_resultado.innerHTML = `Sua nota é ${nota}`;
    }

    function gerar_frequencia() {
        freq = (Math.random() * (100 - 50 + 1) + 50)
            .toFixed(1);

        id_resultado2.innerHTML = `Sua frequencia é ${freq}`;
    }

    function situacao() {
        let situacao;

        if (nota >= 6 && freq >= 75) {
            situacao = "aprovado";
        } else {
            situacao = "reprovado";
        }

        id_resultado3.innerHTML =
            `Com nota ${nota} e frequência ${freq}%, o aluno está ${situacao}!`;
    }
    
</script>
